name: Build & Publish to Docker Hub
on:
  workflow_call:
    inputs:
      base_version:
        description: 'Base version (latest or develop)'
        required: true
        type: string
      info_version:
        description: 'Informational version number (e.g. 0.3.7-alpha)'
        required: true
        type: string
      tag_version:
        description: 'Docker tag version (e.g. v0.3.7)'
        required: true
        type: string
    secrets:
      docker_hub_username:
        required: true
      docker_hub_access_token:
        required: true
jobs:
  build_images:
    name: Build ${{ matrix.name }} image
    runs-on: ${{ matrix.os }}
    if: contains(github.event.head_commit.message, '[no build]') == false
    strategy:
      matrix:
        include:
          - name: amd64
            os: ubuntu-latest
            script: scripts/build-docker-amd64.sh
            next_target: linux-x64
            suffix: '-amd64'
          - name: arm32v7
            os: ubuntu-latest
            script: scripts/build-docker-arm32v7.sh
            next_target: linux-arm
            suffix: '-arm'
          - name: arm64
            os: ubuntu-24.04-arm
            script: scripts/build-docker-arm64.sh
            next_target: linux-arm64
            suffix: '-arm64'
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download next artifacts
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release download develop --repo ErsatzTV/next \
            --pattern "ersatztv-next-*-${{ matrix.next_target }}.tar.gz" \
            --dir next-download
          mkdir next-extracted
          tar xzvf next-download/*.tar.gz -C next-extracted --strip-components 1
          mv next-extracted/ersatztv-channel .
          rm -rf next-download next-extracted

      - name: Set up QEMU
        if: ${{ matrix.name == 'arm32v7' }}
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.docker_hub_username }}
          password: ${{ secrets.docker_hub_access_token }}

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push by digest
        run: |
          ${{ matrix.script }} \
            --info-version "${{ inputs.info_version }}-docker${{ matrix.suffix }}" \
            --push-by-digest \
            --image-name cfurrow/ersatztv \
            --image-name ghcr.io/cfurrow/ersatztv \
            --metadata-file metadata.json

      - name: Save digest to artifact
        run: jq -r '."containerimage.digest"' metadata.json > digest.txt

      - name: Upload digest artifact
        uses: actions/upload-artifact@v4
        with:
          name: digest-${{ matrix.name }}
          path: digest.txt

  merge_manifests:
    name: Merge Manifests
    runs-on: ubuntu-latest
    needs: build_images
    steps:
      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.docker_hub_username }}
          password: ${{ secrets.docker_hub_access_token }}

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Download all digest artifacts
        uses: actions/download-artifact@v4
        with:
          path: digests/

      - name: Read digests from artifacts
        id: digests
        run: |
          AMD64_HASH=$(cat digests/digest-amd64/digest.txt)
          ARM32V7_HASH=$(cat digests/digest-arm32v7/digest.txt)
          ARM64_HASH=$(cat digests/digest-arm64/digest.txt)

          DOCKER_HUB_DIGESTS="cfurrow/ersatztv@${AMD64_HASH} cfurrow/ersatztv@${ARM64_HASH} cfurrow/ersatztv@${ARM32V7_HASH}"
          GHCR_DIGESTS="ghcr.io/cfurrow/ersatztv@${AMD64_HASH} ghcr.io/cfurrow/ersatztv@${ARM64_HASH} ghcr.io/cfurrow/ersatztv@${ARM32V7_HASH}"

          echo "docker_hub_digests=${DOCKER_HUB_DIGESTS}" >> $GITHUB_OUTPUT
          echo "ghcr_digests=${GHCR_DIGESTS}" >> $GITHUB_OUTPUT

      - name: Create and push manifests
        run: |
          docker manifest create cfurrow/ersatztv:${{ inputs.base_version }} ${{ steps.digests.outputs.docker_hub_digests }}
          docker manifest push cfurrow/ersatztv:${{ inputs.base_version }}
          docker manifest create cfurrow/ersatztv:${{ inputs.tag_version }} ${{ steps.digests.outputs.docker_hub_digests }}
          docker manifest push cfurrow/ersatztv:${{ inputs.tag_version }}

          docker manifest create ghcr.io/cfurrow/ersatztv:${{ inputs.base_version }} ${{ steps.digests.outputs.ghcr_digests }}
          docker manifest push ghcr.io/cfurrow/ersatztv:${{ inputs.base_version }}
          docker manifest create ghcr.io/cfurrow/ersatztv:${{ inputs.tag_version }} ${{ steps.digests.outputs.ghcr_digests }}
          docker manifest push ghcr.io/cfurrow/ersatztv:${{ inputs.tag_version }}
